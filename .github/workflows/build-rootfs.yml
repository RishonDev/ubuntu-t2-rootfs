name: Build T2 Ubuntu Rootfs

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v24.04-2026.05.15); leave blank to auto-generate'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  create-release:
    name: Create release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set release tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          [ -z "$TAG" ] && TAG="v26.04-$(date +%Y.%m.%d)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release view "$TAG" &>/dev/null && \
            echo "Release $TAG already exists — will upload to it" || \
            gh release create "$TAG" \
              --title "T2 Ubuntu Rootfs ${TAG}" \
              --notes "Automated build from workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

  build:
    name: ${{ matrix.flavor }}
    needs: create-release
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: ubuntu
            script: build-ubuntu.sh
          - flavor: kubuntu
            script: build-kubuntu.sh
          - flavor: ubuntu-unity
            script: build-unity.sh
          - flavor: ubuntu-budgie
            script: build-budgie.sh
          - flavor: ubuntu-cinnamon
            script: build-cinnamon.sh
          - flavor: xubuntu
            script: build-xubuntu.sh

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Enable KVM
        run: sudo chmod 666 /dev/kvm

      - name: Build rootfs
        run: bash scripts/${{ matrix.script }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          find build/${{ matrix.flavor }}/ -type f | sort | \
            xargs gh release upload "$TAG" --clobber

  update-metadata:
    name: Update metadata.json
    needs: [create-release, build]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download sha256 files from release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          mkdir -p artifacts
          gh release download "$TAG" --pattern "*.sha256" --dir artifacts/ || true

      - name: Generate metadata.json
        env:
          TAG: ${{ needs.create-release.outputs.tag }}
        run: |
          python3 << 'EOF'
          import json, os

          REPO  = os.environ["GITHUB_REPOSITORY"]
          TAG   = os.environ["TAG"]
          BASE  = f"https://github.com/{REPO}/releases/download/{TAG}"

          NAMES = {
              "ubuntu":          "Ubuntu 26.04 - Resolute Raccoon",
              "kubuntu":         "Kubuntu 26.04 - Resolute Raccoon",
              "ubuntu-unity":    "Ubuntu Unity 26.04 - Resolute Raccoon",
              "ubuntu-budgie":   "Ubuntu Budgie 26.04 - Resolute Raccoon",
              "ubuntu-cinnamon": "Ubuntu Cinnamon 26.04 - Resolute Raccoon",
              "xubuntu":         "Xubuntu 26.04 - Resolute Raccoon",
          }

          entries = []
          for flavor, name in NAMES.items():
              parts_sha = f"artifacts/{flavor}-26.04-t2-rootfs.sha256"
              xz_sha    = f"artifacts/{flavor}-26.04-t2-rootfs.img.xz.sha256"
              if not os.path.exists(parts_sha):
                  continue
              parts = [
                  f"{BASE}/{line.split()[-1]}"
                  for line in open(parts_sha)
                  if line.strip()
              ]
              entry = {"name": name, "iso": parts}
              if os.path.exists(xz_sha):
                  entry["sha256"] = open(xz_sha).read().strip()
              entries.append(entry)

          with open("metadata.json", "w") as f:
              json.dump({"all": entries}, f, indent=2)
              f.write("\n")
          print(f"Generated metadata.json with {len(entries)} entries")
          EOF

      - name: Upload metadata.json
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.create-release.outputs.tag }}
        run: gh release upload "$TAG" metadata.json --clobber
