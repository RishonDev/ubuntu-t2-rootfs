name: Build T2 Ubuntu Rootfs

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v24.04-2026.05.15); leave blank to auto-generate'
        required: false
        default: ''

jobs:
  build:
    name: ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: ubuntu
            script: build-ubuntu.sh
          - flavor: kubuntu
            script: build-kubuntu.sh
          - flavor: ubuntu-unity
            script: build-unity.sh
          - flavor: ubuntu-budgie
            script: build-budgie.sh
          - flavor: ubuntu-cinnamon
            script: build-cinnamon.sh
          - flavor: xubuntu
            script: build-xubuntu.sh

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Enable KVM
        run: sudo chmod 666 /dev/kvm

      - name: Build rootfs
        run: bash scripts/${{ matrix.script }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.flavor }}-rootfs
          path: |
            build/${{ matrix.flavor }}/${{ matrix.flavor }}-*-t2-rootfs.img.xz.part*
            build/${{ matrix.flavor }}/${{ matrix.flavor }}-*-t2-rootfs.sha256
            build/${{ matrix.flavor }}/${{ matrix.flavor }}-*-t2-rootfs.img.xz.sha256
          retention-days: 30

  release:
    name: Create release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Set release tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.release_tag }}"
          [ -z "$TAG" ] && TAG="v26.04-$(date +%Y.%m.%d)"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release view "$TAG" &>/dev/null && \
            echo "Release $TAG already exists — uploading to it" || \
            gh release create "$TAG" \
              --title "T2 Ubuntu Rootfs ${TAG}" \
              --notes "Automated build from workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          find artifacts/ -type f | sort | \
            xargs gh release upload "$TAG" --clobber

      - name: Generate metadata.json
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          python3 << 'EOF'
          import json, os, glob

          REPO  = os.environ["GITHUB_REPOSITORY"]
          TAG   = os.environ["TAG"]
          BASE  = f"https://github.com/{REPO}/releases/download/{TAG}"

          NAMES = {
              "ubuntu":           "Ubuntu 26.04 - Resolute Raccoon",
              "kubuntu":          "Kubuntu 26.04 - Resolute Raccoon",
              "ubuntu-unity":     "Ubuntu Unity 26.04 - Resolute Raccoon",
              "ubuntu-budgie":    "Ubuntu Budgie 26.04 - Resolute Raccoon",
              "ubuntu-cinnamon":  "Ubuntu Cinnamon 26.04 - Resolute Raccoon",
              "xubuntu":          "Xubuntu 26.04 - Resolute Raccoon",
          }

          entries = []
          for flavor, name in NAMES.items():
              parts = sorted(glob.glob(
                  f"artifacts/{flavor}-rootfs/{flavor}-26.04-t2-rootfs.img.xz.part*"
              ))
              if not parts:
                  continue
              sha_file = f"artifacts/{flavor}-rootfs/{flavor}-26.04-t2-rootfs.img.xz.sha256"
              entry = {"name": name, "iso": [f"{BASE}/{os.path.basename(p)}" for p in parts]}
              if os.path.exists(sha_file):
                  entry["sha256"] = open(sha_file).read().strip()
              entries.append(entry)

          with open("metadata.json", "w") as f:
              json.dump({"all": entries}, f, indent=2)
              f.write("\n")
          print(f"Generated metadata.json with {len(entries)} entries")
          EOF

      - name: Upload metadata.json
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: gh release upload "$TAG" metadata.json --clobber
