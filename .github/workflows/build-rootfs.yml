name: Build T2 Ubuntu Rootfs

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag (e.g. v24.04-2026.05.15); leave blank to auto-generate'
        required: false
        default: ''

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: ${{ matrix.flavor }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: ubuntu
            script: build-ubuntu.sh
          - flavor: kubuntu
            script: build-kubuntu.sh
          - flavor: ubuntu-unity
            script: build-unity.sh
          - flavor: ubuntu-budgie
            script: build-budgie.sh
          - flavor: ubuntu-cinnamon
            script: build-cinnamon.sh
          - flavor: xubuntu
            script: build-xubuntu.sh

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Enable KVM
        run: sudo chmod 666 /dev/kvm

      - name: Build rootfs
        run: bash scripts/${{ matrix.script }}

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source release.conf
          TAG="${{ github.event.inputs.release_tag }}"
          [ -z "$TAG" ] && TAG="v${UBUNTU_VERSION}-$(date +%Y.%m.%d)"
          gh release view "$TAG" &>/dev/null || \
            gh release create "$TAG" \
              --title "T2 Ubuntu Rootfs ${TAG}" \
              --notes "Automated build from workflow run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" || true
          find build/${{ matrix.flavor }}/ -type f | sort | \
            xargs gh release upload "$TAG" --clobber

  update-metadata:
    name: Update metadata.json
    needs: build
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download sha256 files from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          source release.conf
          TAG="${{ github.event.inputs.release_tag }}"
          [ -z "$TAG" ] && TAG="v${UBUNTU_VERSION}-$(date +%Y.%m.%d)"
          echo "TAG=${TAG}"                   >> "$GITHUB_ENV"
          echo "UBUNTU_VERSION=${UBUNTU_VERSION}" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=${RELEASE_NAME}" >> "$GITHUB_ENV"
          mkdir -p artifacts
          gh release download "$TAG" --pattern "*.sha256" --dir artifacts/ || true

      - name: Generate metadata.json
        run: |
          python3 << 'EOF'
          import json, os

          REPO    = os.environ["GITHUB_REPOSITORY"]
          TAG     = os.environ["TAG"]
          VER     = os.environ["UBUNTU_VERSION"]
          RELEASE = os.environ["RELEASE_NAME"]
          BASE    = f"https://github.com/{REPO}/releases/download/{TAG}"

          FLAVORS = {
              "ubuntu":          f"Ubuntu {VER} - {RELEASE}",
              "kubuntu":         f"Kubuntu {VER} - {RELEASE}",
              "ubuntu-unity":    f"Ubuntu Unity {VER} - {RELEASE}",
              "ubuntu-budgie":   f"Ubuntu Budgie {VER} - {RELEASE}",
              "ubuntu-cinnamon": f"Ubuntu Cinnamon {VER} - {RELEASE}",
              "xubuntu":         f"Xubuntu {VER} - {RELEASE}",
          }

          entries = []
          for flavor, name in FLAVORS.items():
              parts_sha = f"artifacts/{flavor}-{VER}-t2-rootfs.sha256"
              xz_sha    = f"artifacts/{flavor}-{VER}-t2-rootfs.img.xz.sha256"
              if not os.path.exists(parts_sha):
                  continue
              parts = [
                  f"{BASE}/{line.split()[-1]}"
                  for line in open(parts_sha)
                  if line.strip()
              ]
              entry = {"name": name, "iso": parts}
              if os.path.exists(xz_sha):
                  entry["sha256"] = open(xz_sha).read().strip()
              entries.append(entry)

          with open("metadata.json", "w") as f:
              json.dump({"all": entries}, f, indent=2)
              f.write("\n")
          print(f"Generated metadata.json with {len(entries)} entries")
          EOF

      - name: Upload metadata.json
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" metadata.json --clobber
